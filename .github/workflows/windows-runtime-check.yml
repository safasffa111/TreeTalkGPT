name: Windows Runtime Check

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.16.0"
      - name: Configure registry
        shell: bash
        run: |
          npm config set registry https://registry.npmjs.org/ --location=project
          npm config delete electron_mirror --location=project || true
          npm config delete electron_builder_binaries_mirror --location=project || true
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Test source
        run: npm run preflight
      - name: Apply packaging correction
        shell: pwsh
        run: |
          npm pkg set version=0.2.3
          npm pkg set build.asar=false --json
          npm pkg delete build.asarUnpack
      - name: Build installer
        run: npm run build:win
      - name: Check installed application
        shell: pwsh
        run: ./scripts/check-installed-app.ps1
      - name: Print result
        if: always()
        shell: pwsh
        run: |
          $result = Join-Path $env:RUNNER_TEMP "treetalk-diagnostics\result.txt"
          if (Test-Path $result) { Get-Content $result }
      - name: Save diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TreeTalk-Windows-Runtime-Diagnostics
          path: ${{ runner.temp }}/treetalk-diagnostics/**
          if-no-files-found: warn
          retention-days: 14
