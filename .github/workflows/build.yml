name: Build TreeTalk Desktop

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "build/**"
      - "scripts/**"
      - "tests/**"
      - "package.json"
      - ".npmrc"
      - ".github/workflows/build.yml"
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: tree-talk-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    name: Windows 11 x64 installer
    runs-on: windows-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.16.0"

      - name: Use GitHub runner registries
        shell: bash
        run: |
          npm config set registry https://registry.npmjs.org/ --location=project
          npm config delete electron_mirror --location=project || true
          npm config delete electron_builder_binaries_mirror --location=project || true

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run regression checks
        run: npm run preflight

      - name: Build NSIS installer
        run: npm run build:win

      - name: Install and launch smoke test
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $installer = Get-ChildItem -Path dist -File -Filter "TreeTalk-Desktop-*-win-x64.exe" | Select-Object -First 1
          if (-not $installer) { throw "NSIS installer was not generated" }

          Start-Process -FilePath $installer.FullName -ArgumentList "/S" -Wait
          Start-Sleep -Seconds 3

          $installedExe = Get-ChildItem -Path "$env:LOCALAPPDATA\Programs" -Recurse -File -Filter "TreeTalk Desktop.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $installedExe) { throw "Installed TreeTalk Desktop.exe was not found" }

          $process = Start-Process -FilePath $installedExe.FullName -PassThru
          $windowReady = $false
          for ($i = 0; $i -lt 30; $i++) {
            Start-Sleep -Milliseconds 500
            if ($process.HasExited) { throw "Installed application exited during startup with code $($process.ExitCode)" }
            $process.Refresh()
            if ($process.MainWindowHandle -ne 0) {
              $windowReady = $true
              break
            }
          }
          if (-not $windowReady) {
            Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
            throw "Installed application stayed running but did not create a visible main window"
          }
          Stop-Process -Id $process.Id -Force

      - uses: actions/upload-artifact@v4
        with:
          name: TreeTalk-Desktop-Windows-11-x64
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  macos:
    name: macOS Intel and Apple Silicon
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.16.0"

      - name: Use GitHub runner registries
        run: |
          npm config set registry https://registry.npmjs.org/ --location=project
          npm config delete electron_mirror --location=project || true
          npm config delete electron_builder_binaries_mirror --location=project || true

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run regression checks
        run: npm run preflight

      - name: Build unsigned DMG and ZIP packages
        run: npm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - uses: actions/upload-artifact@v4
        with:
          name: TreeTalk-Desktop-macOS-x64-arm64
          path: dist/*
          if-no-files-found: error
          retention-days: 14
