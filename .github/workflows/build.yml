name: Build TreeTalk Desktop

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "build/**"
      - "scripts/**"
      - "tests/**"
      - "package.json"
      - ".npmrc"
      - ".github/workflows/build.yml"
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: tree-talk-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-build:
    name: Windows 11 x64 installer build
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.16.0"

      - name: Use GitHub runner registries
        shell: bash
        run: |
          npm config set registry https://registry.npmjs.org/ --location=project
          npm config delete electron_mirror --location=project || true
          npm config delete electron_builder_binaries_mirror --location=project || true

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run regression checks
        run: npm run preflight

      - name: Build NSIS installer
        run: npm run build:win

      - uses: actions/upload-artifact@v4
        with:
          name: TreeTalk-Desktop-Windows-11-x64
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  windows-smoke:
    name: Windows installed app startup
    needs: windows-build
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: TreeTalk-Desktop-Windows-11-x64
          path: dist

      - name: Install and open the packaged application
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          function Show-TreeTalkDiagnostics {
            Write-Host "===== Installed files ====="
            Get-ChildItem -Path "$env:LOCALAPPDATA\Programs" -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.FullName -like "*TreeTalk*" } | Select-Object -ExpandProperty FullName
            Write-Host "===== Startup logs ====="
            @("D:\TreeTalkDesktopData", "$env:USERPROFILE\Documents\TreeTalkDesktopData", "$env:APPDATA\TreeTalk Desktop") | ForEach-Object {
              if (Test-Path $_) {
                Get-ChildItem -Path $_ -Recurse -File -Filter "startup.log" -ErrorAction SilentlyContinue | ForEach-Object {
                  Write-Host "--- $($_.FullName) ---"
                  Get-Content $_.FullName
                }
              }
            }
            $electronLog = Join-Path $env:RUNNER_TEMP "treetalk-electron.log"
            if (Test-Path $electronLog) {
              Write-Host "===== Electron log ====="
              Get-Content $electronLog
            }
          }

          $installer = Get-ChildItem -Path dist -File -Filter "TreeTalk-Desktop-*-win-x64.exe" | Select-Object -First 1
          if (-not $installer) { throw "NSIS installer was not generated" }
          Start-Process -FilePath $installer.FullName -ArgumentList "/S" -Wait
          Start-Sleep -Seconds 3

          Get-Process -Name "TreeTalk Desktop" -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 1

          $installedExe = Get-ChildItem -Path "$env:LOCALAPPDATA\Programs" -Recurse -File -Filter "TreeTalk Desktop.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $installedExe) {
            Show-TreeTalkDiagnostics
            throw "Installed TreeTalk Desktop.exe was not found"
          }

          $electronLog = Join-Path $env:RUNNER_TEMP "treetalk-electron.log"
          $process = Start-Process -FilePath $installedExe.FullName -ArgumentList "--enable-logging", "--log-file=$electronLog" -PassThru
          $windowReady = $false
          for ($i = 0; $i -lt 40; $i++) {
            Start-Sleep -Milliseconds 500
            if ($process.HasExited) {
              Show-TreeTalkDiagnostics
              throw "Installed application exited during startup with code $($process.ExitCode)"
            }
            $process.Refresh()
            if ($process.MainWindowHandle -ne 0) {
              $windowReady = $true
              break
            }
          }
          if (-not $windowReady) {
            Show-TreeTalkDiagnostics
            Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
            throw "Installed application stayed running but did not create a visible main window"
          }
          Write-Host "TreeTalk Desktop opened successfully. Window handle: $($process.MainWindowHandle)"
          Stop-Process -Id $process.Id -Force

      - name: Upload startup diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TreeTalk-Desktop-Windows-startup-diagnostics
          path: |
            D:/TreeTalkDesktopData/startup.log
            ${{ runner.temp }}/treetalk-electron.log
          if-no-files-found: ignore
          retention-days: 14

  macos:
    name: macOS Intel and Apple Silicon
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.16.0"

      - name: Use GitHub runner registries
        run: |
          npm config set registry https://registry.npmjs.org/ --location=project
          npm config delete electron_mirror --location=project || true
          npm config delete electron_builder_binaries_mirror --location=project || true

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run regression checks
        run: npm run preflight

      - name: Build unsigned DMG and ZIP packages
        run: npm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - uses: actions/upload-artifact@v4
        with:
          name: TreeTalk-Desktop-macOS-x64-arm64
          path: dist/*
          if-no-files-found: error
          retention-days: 14
